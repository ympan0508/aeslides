<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>致敬西南联大</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col justify-center items-center relative overflow-hidden">
<div class="absolute inset-0">
<img src="https://sfile.chatglm.cn/images-ppt/e4c974240c28.jpg" alt="西南联大情景" class="w-full h-full object-cover"/>
<div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/60 to-black/75"></div>
</div>
<div class="relative z-10 text-center px-20 flex flex-col items-center justify-center">
<div class="mb-12">
<div class="w-24 h-1 mx-auto mb-8 bg-gradient-to-r from-transparent via-yellow-400 to-transparent"></div>
<h1 class="title-font text-[72px] font-bold text-white leading-tight mb-6 tracking-wide">
致敬西南联大
</h1>
<div class="w-32 h-1 mx-auto my-8 bg-gradient-to-r from-transparent via-yellow-400 to-transparent"></div>
</div>
<div class="bg-white/10 backdrop-blur-md rounded-2xl px-12 py-6 border border-white/20">
<p class="text-yellow-300 text-3xl font-light leading-relaxed title-font">
传承刚毅坚卓精神，续写教育华章
</p>
</div>
<div class="mt-16 flex items-center justify-center gap-6 animate-pulse">
<div class="flex items-center gap-2 bg-white/5 backdrop-blur-sm rounded-lg px-6 py-3">
<i class="material-icons text-yellow-400 text-2xl">stars</i>
<span class="text-white/80 text-lg font-light">National Southwestern Associated University</span>
</div>
<div class="flex items-center gap-2 bg-white/5 backdrop-blur-sm rounded-lg px-6 py-3">
<i class="material-icons text-yellow-400 text-2xl">history</i>
<span class="text-white/80 text-lg font-light">1937-1946</span>
</div>
</div>
</div>
</div>
</body>
</html>
