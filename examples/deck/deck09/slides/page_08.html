<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>"模范党支部"战旗演讲PPT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 900
    }
.motto-font {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 700
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col justify-center items-center relative overflow-hidden" style="background: linear-gradient(rgba(200, 16, 46, 0.75), rgba(139, 0, 0, 0.85)), url(https://sfile.chatglm.cn/images-ppt/258151cb8d60.jpeg);
background-size: cover;
background-position: center">
<div class="absolute inset-0" style="background: rgba(0, 0, 0, 0.4)"></div>

<div class="relative z-10 text-center px-20 flex flex-col items-center justify-center flex-grow">
<div class="mb-12">
<div class="inline-block p-5 bg-white bg-opacity-10 backdrop-blur-sm rounded-full mb-6">
<i class="material-icons text-yellow-400 text-7xl">flag</i>
</div>
<h1 class="title-font text-6xl text-white leading-tight mb-4 tracking-wider">
接过先辈旗帜<br/>续写新的篇章
</h1>
<div class="w-96 h-1 mx-auto bg-gradient-to-r from-transparent via-yellow-400 to-transparent"></div>
</div>

<div class="max-w-4xl space-y-6">
<p class="text-white text-2xl leading-relaxed font-medium">
让我们接过先辈的旗帜，以坚强的党支部为核心，以英雄为榜样，
</p>
<p class="text-white text-2xl leading-relaxed font-medium">
把战旗精神融入血脉、铸入灵魂，在新时代的战场上续写新的胜利篇章！
</p>

<div class="flex items-center justify-center gap-4 mt-8">
<div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
<p class="text-yellow-300 text-xl font-bold tracking-widest">忠诚 · 复兴 · 强军</p>
<div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
</div>
</div>
</div>

<div class="relative z-10 mt-6 bg-gradient-to-r from-transparent via-red-900 to-transparent py-4">
<p class="text-white text-lg font-medium">不忘初心 牢记使命 为打赢现代化战争而努力奋斗</p>
</div>
</div>
</body>
</html>
