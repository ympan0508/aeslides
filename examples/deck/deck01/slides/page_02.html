<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>画家黄公望</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Serif SC", serif;
    background: #f5f5f0
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex" style="background: #f4f1ea">
<!-- 左侧图片区域 -->
<div class="w-[45%] relative overflow-hidden">
<img alt="黄公望画像" class="w-full h-full object-cover" src="https://sfile.chatglm.cn/images-ppt/ec23e876542d.jpg"/>
<div class="absolute bottom-0 left-0 right-0 h-24" style="background: linear-gradient(to top, rgba(212, 175, 55, 0.3), transparent)"></div>
</div>

<!-- 右侧文字内容区域 -->
<div class="w-[55%] flex flex-col justify-center px-16 py-12">
<div class="mb-8">
<h2 class="title-font text-5xl font-bold mb-2" style="color: #2c3e50">画家黄公望</h2>
<div class="w-24 h-1 mb-6" style="background: #d4af37"></div>
</div>

<div class="space-y-6">
<!-- 基本信息 -->
<div class="flex items-start">
<i class="material-icons mr-4 mt-1" style="color: #d4af37;
font-size: 28px">person</i>
<div>
<h3 class="text-lg font-semibold mb-1" style="color: #5a6c7a">基本信息</h3>
<p class="text-base leading-relaxed" style="color: #2c3e50">本名陆坚，字子久，号一峰、大痴道人，平江常熟（今江苏）人</p>
</div>
</div>

<!-- 生平经历 -->
<div class="flex items-start">
<i class="material-icons mr-4 mt-1" style="color: #d4af37;
font-size: 28px">history</i>
<div>
<h3 class="text-lg font-semibold mb-1" style="color: #5a6c7a">生平经历</h3>
<p class="text-base leading-relaxed" style="color: #2c3e50">中年任浙西廉访司书吏。后因上司贪案被诬入狱，出狱后看破红尘，四处云游，专心研究绘画</p>
</div>
</div>

<!-- 艺术成就 -->
<div class="flex items-start">
<i class="material-icons mr-4 mt-1" style="color: #d4af37;
font-size: 28px">masonry</i>
<div>
<h3 class="text-lg font-semibold mb-1" style="color: #5a6c7a">艺术成就</h3>
<p class="text-base leading-relaxed" style="color: #2c3e50">元四家之一。直接受教于赵孟頫，创造了"浅绛山水"技法。享年85岁，晚年技法炉火纯青</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
