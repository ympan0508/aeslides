<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>感谢观看</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Serif SC", serif;
    background: #f5f5f0
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col justify-center items-center relative overflow-hidden">
<!-- 背景图片 -->
<div class="absolute top-0 left-0 w-full h-full">
<img alt="富春山居图意境背景" class="w-full h-full object-cover" src="https://sfile.chatglm.cn/images-ppt/5fe624d6e072.jpg"/>
<div class="absolute top-0 left-0 w-full h-full" style="background: rgba(44, 62, 80, 0.7)"></div>
</div>

<!-- 主要内容区域 -->
<div class="relative z-10 flex flex-col justify-center items-center px-20">
<!-- 感谢文字 -->
<h2 class="title-font text-6xl font-bold text-center mb-8" style="color: #f9f7f2;
letter-spacing: 0.15em;
line-height: 1.5">
感谢观看
</h2>

<!-- 分隔线 -->
<div class="w-48 h-0.5 mb-10" style="background: #d4af37"></div>

<!-- 总结文字 -->
<p class="text-2xl text-center leading-relaxed max-w-4xl" style="color: #e8e4d8;
line-height: 1.8">
《富春山居图》不仅是一幅山水画杰作，更是中国文人精神的象征<br/>
它以笔墨展现了山水的内在生命，以意境传达了超越时空的审美追求
</p>

<!-- 装饰元素 -->
<div class="mt-16 flex items-center">
<i class="material-icons mr-2" style="color: #d4af37;
font-size: 32px">auto_awesome</i>
<div class="flex items-center h-1" style="background: rgba(212, 175, 55, 0.5)">
<div class="w-16 h-0.5" style="background: #d4af37"></div>
<div class="flex-grow h-px" style="background: rgba(212, 175, 55, 0.5)"></div>
<div class="w-16 h-0.5" style="background: #d4af37"></div>
</div>
</div>
</div>
</div>
</body>
</html>
