<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>技法鉴赏 · 色彩与墨韵</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Serif SC", serif;
    background: #f5f5f0
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex" style="background: #f4f1ea">
<!-- 左侧图片区域 -->
<div class="w-[48%] relative overflow-hidden flex flex-col">
<div class="relative flex-grow">
<img alt="富春山居图局部细节" class="w-full h-full object-cover" src="https://sfile.chatglm.cn/images-ppt/78635d02741c.jpg"/>
<div class="absolute bottom-0 left-0 right-0 h-24" style="background: linear-gradient(to top, rgba(212, 175, 55, 0.4), transparent)"></div>
</div>
<div class="px-8 py-5" style="background: rgba(0, 0, 0, 0.05)">
<div class="flex items-center justify-center">
<i class="material-icons mr-2" style="color: #d4af37;
font-size: 24px">palette</i>
<span class="text-sm font-semibold" style="color: #5a6c7a">淡墨勾勒 · 浅绛设色</span>
</div>
</div>
</div>

<!-- 右侧文字内容区域 -->
<div class="w-[52%] flex flex-col justify-center px-14 py-10">
<div class="mb-6">
<h2 class="title-font text-4xl font-bold" style="color: #2c3e50">色彩与墨韵</h2>
<div class="w-20 h-0.5 mt-3" style="background: #d4af37"></div>
</div>

<div class="space-y-5">
<!-- 色彩运用 -->
<div class="flex items-start">
<div class="flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4" style="background: rgba(212, 175, 55, 0.15)">
<i class="material-icons" style="color: #d4af37;
font-size: 24px">tune</i>
</div>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-1" style="color: #2c3e50">色彩运用</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">采用淡墨绘、浅灰、淡青、胭脂和雪白等色彩，呈现清新淡雅、色调温和</p>
</div>
</div>

<!-- 浅绛技法 -->
<div class="flex items-start">
<div class="flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4" style="background: rgba(212, 175, 55, 0.15)">
<i class="material-icons" style="color: #d4af37;
font-size: 24px">forest</i>
</div>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-1" style="color: #2c3e50">浅绛技法</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">将淡墨皴擦与赭色、墨青绿等色合染糅为一体，形成独特的"浅绛山水"风格</p>
</div>
</div>

<!-- 墨色变化 -->
<div class="flex items-start">
<div class="flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4" style="background: rgba(212, 175, 55, 0.15)">
<i class="material-icons" style="color: #d4af37;
font-size: 24px">blur_on</i>
</div>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-1" style="color: #2c3e50">墨色变化</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">墨色浓淡干湿并用，深浅相间、层次分明，用墨秀润淡雅但气度不凡</p>
</div>
</div>

<!-- 艺术效果 -->
<div class="flex items-start">
<div class="flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4" style="background: rgba(212, 175, 55, 0.15)">
<i class="material-icons" style="color: #d4af37;
font-size: 24px">auto_awesome</i>
</div>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-1" style="color: #2c3e50">艺术效果</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">以墨为骨、以灰为肌、以翠为血，创造虚实相生、显微透体、骨韵相存的艺术效果</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
