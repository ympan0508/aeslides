<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>"模范党支部"战旗演讲PPT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 900
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col relative overflow-hidden" style="background: #FEFEFE">
<div class="h-[80px] flex items-center px-16" style="background: linear-gradient(90deg, #C8102E 0%, #8B0000 100%)">
<h1 class="title-font text-5xl text-white tracking-wider">战旗破晓：从黄麻烽火中走来的信仰堡垒</h1>
</div>

<div class="flex-grow flex px-16 py-10 gap-8">
<div class="w-1/2 flex flex-col justify-center space-y-5">
<div class="flex items-start space-x-4 p-5 bg-white rounded-lg shadow-md border-l-4 border-red-700">
<div class="flex-shrink-0 w-12 h-12 flex items-center justify-center rounded-full" style="background: #C8102E">
<span class="text-white text-xl font-bold">1927</span>
</div>
<div>
<h3 class="font-bold text-xl text-gray-800 mb-1">黄麻起义</h3>
<p class="text-gray-600 text-base">连队诞生于革命烽火，前身为中国工农革命军鄂东军骨干</p>
</div>
</div>

<div class="flex items-start space-x-4 p-5 bg-white rounded-lg shadow-md border-l-4 border-red-700">
<div class="flex-shrink-0 w-12 h-12 flex items-center justify-center rounded-full" style="background: #C8102E">
<span class="text-white text-xl font-bold">1935</span>
</div>
<div>
<h3 class="font-bold text-xl text-gray-800 mb-1">长征途中</h3>
<p class="text-gray-600 text-base">在极端艰险环境下完成掩护任务，获"支部是连队堡垒"称号</p>
</div>
</div>

<div class="flex items-start space-x-4 p-5 bg-white rounded-lg shadow-md border-l-4 border-red-700">
<div class="flex-shrink-0 w-12 h-12 flex items-center justify-center rounded-full" style="background: #C8102E">
<span class="text-white text-xl font-bold">1940</span>
</div>
<div>
<h3 class="font-bold text-xl text-gray-800 mb-1">护送朱德</h3>
<p class="text-gray-600 text-base">前往洛阳谈判，坚守纪律不沾奢靡，圆满完成特殊任务</p>
</div>
</div>

<div class="flex items-start space-x-4 p-5 bg-white rounded-lg shadow-md border-l-4 border-yellow-500">
<div class="flex-shrink-0 w-12 h-12 flex items-center justify-center rounded-full" style="background: #FFD700">
<span class="text-white text-xl font-bold">1941</span>
</div>
<div>
<h3 class="font-bold text-xl text-gray-800 mb-1">正式授予战旗</h3>
<p class="text-gray-600 text-base">八路军野战政治部授予"模范党支部"荣誉，传承至今</p>
</div>
</div>
</div>

<div class="w-1/2 flex items-center justify-center">
<div class="relative">
<img src="https://sfile.chatglm.cn/images-ppt/6771255b4981.jpg" alt="红军长征" class="w-full h-[520px] object-cover rounded-lg shadow-2xl"/>
<div class="absolute -bottom-4 -right-4 bg-yellow-500 text-white px-6 py-2 rounded-lg shadow-lg">
<p class="font-bold text-lg">连续奋斗</p>
<p class="text-sm">支部建在连上</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
