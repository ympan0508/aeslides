<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cryptocurrency Exchange API Documentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <style type="text/tailwindcss">
        @layer utilities {
            .ppt-slide {
                @apply relative w-[1280px] h-[720px] mx-auto box-border overflow-hidden
            }
        }
    </style>
    <style>body {
    font-family: "Inter", sans-serif;
    background: #0f172a
    }
.crypto-icon {
    color: #60A5FA;
    animation: pulse 2s infinite
    }
@keyframes pulse {
    0%, 100% {
        opacity: 1;
        transform: scale(1);
        } 50% {
        opacity: 0.7;
        transform: scale(1.05);
        }
    }
.gradient-bg {
    background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%)
    }
.glow-effect {
    box-shadow: 0 0 60px rgba(124, 58, 237, 0.3)
    }
.text-glow {
    text-shadow: 0 0 30px rgba(255, 255, 255, 0.3)
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
    <div class="ppt-slide gradient-bg">
        <!-- Background Pattern -->
        <div class="absolute inset-0 opacity-5">
            <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)"/>
            </svg>
        </div>
        
        <!-- Decorative Elements -->
        <div class="absolute top-0 right-0 w-96 h-96 bg-purple-500 rounded-full filter blur-[100px] opacity-20"></div>
        <div class="absolute bottom-0 left-0 w-80 h-80 bg-blue-500 rounded-full filter blur-[80px] opacity-20"></div>
        
        <!-- Main Content -->
        <div class="relative z-10 h-full flex flex-col justify-center items-center px-20">
            <!-- Icon -->
            <div class="mb-8">
                <i class="material-icons crypto-icon" style="font-size: 80px">currency_exchange</i>
            </div>
            
            <!-- Main Title -->
            <h1 class="text-[64px] font-bold text-white text-center leading-tight mb-6 text-glow">
                Cryptocurrency Exchange API Documentation
            </h1>
            
            <!-- Subtitle -->
            <div class="flex items-center gap-4 mb-12">
                <div class="h-px w-16 bg-white opacity-40"></div>
                <h2 class="text-2xl font-light text-white tracking-wider text-glow">
                    Simple. Powerful. Secure.
                </h2>
                <div class="h-px w-16 bg-white opacity-40"></div>
            </div>
            
            <!-- Feature Pills -->
            <div class="flex gap-6 mb-8">
                <div class="flex items-center gap-2 bg-white bg-opacity-10 backdrop-blur-sm px-4 py-2 rounded-full border border-white border-opacity-20">
                    <i class="material-icons text-white text-xl">flash_on</i>
                    <span class="text-white text-sm font-medium">Real-time Data</span>
                </div>
                <div class="flex items-center gap-2 bg-white bg-opacity-10 backdrop-blur-sm px-4 py-2 rounded-full border border-white border-opacity-20">
                    <i class="material-icons text-white text-xl">security</i>
                    <span class="text-white text-sm font-medium">Enterprise Security</span>
                </div>
                <div class="flex items-center gap-2 bg-white bg-opacity-10 backdrop-blur-sm px-4 py-2 rounded-full border border-white border-opacity-20">
                    <i class="material-icons text-white text-xl">speed</i>
                    <span class="text-white text-sm font-medium">Lightning Fast</span>
                </div>
            </div>
            
            <!-- Bottom CTA -->
            <div class="mt-12">
                <p class="text-blue-200 text-lg font-light mb-2">Start integrating with our API</p>
                <div class="flex items-center gap-2 text-white text-sm">
                    <span class="bg-purple-600 px-3 py-1 rounded-lg font-semibold">Documentation Portal</span>
                    <i class="material-icons text-xl">arrow_forward</i>
                </div>
            </div>
        </div>
        
        <!-- Bottom Accent -->
        <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-blue-500"></div>
    </div>
</body>
</html>
