<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>烽火中诞生的学府</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col bg-gradient-to-br from-slate-50 to-slate-100">
<div class="h-[80px] flex items-center px-16 border-b-2 border-slate-200">
<h1 class="title-font text-[42px] font-bold text-slate-800">烽火中诞生的学府</h1>
</div>
<div class="flex-grow flex items-stretch h-[640px]">
<div class="w-[45%] flex flex-col justify-center px-12">
<div class="relative">
<img src="https://sfile.chatglm.cn/images-ppt/a57b33c7db59.jpg" alt="西南联大校园" class="w-full h-[520px] object-cover rounded-lg shadow-2xl"/>
<div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-4 rounded-b-lg">
<p class="text-white text-sm font-light">西南联大蒙自分校</p>
</div>
</div>
</div>
<div class="w-[55%] flex flex-col justify-center px-16 py-12">
<div class="space-y-8">
<div class="flex items-start gap-4">
<div class="flex-shrink-0 w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center">
<i class="material-icons text-amber-700 text-2xl">history</i>
</div>
<div class="flex-1">
<div class="flex items-center gap-3 mb-2">
<span class="text-amber-700 font-bold text-xl">1937.07</span>
<span class="text-slate-600 font-light">抗日战争全面爆发，平津沦陷</span>
</div>
<div class="w-16 h-0.5 bg-amber-400"></div>
</div>
</div>
<div class="flex items-start gap-4">
<div class="flex-shrink-0 w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
<i class="material-icons text-blue-700 text-2xl">place</i>
</div>
<div class="flex-1">
<div class="flex items-center gap-3 mb-2">
<span class="text-blue-700 font-bold text-xl">1938.04</span>
<span class="text-slate-600 font-light">三校南迁昆明，更名为国立西南联合大学</span>
</div>
<div class="w-16 h-0.5 bg-blue-400"></div>
</div>
</div>
<div class="flex items-start gap-4">
<div class="flex-shrink-0 w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
<i class="material-icons text-red-700 text-2xl">flag</i>
</div>
<div class="flex-1">
<div class="flex items-center gap-3 mb-2">
<span class="text-red-700 font-bold text-xl">1946.05</span>
<span class="text-slate-600 font-light">抗战胜利，三校复员北返，联大解散</span>
</div>
<div class="w-16 h-0.5 bg-red-400"></div>
</div>
</div>
<div class="pt-8 border-t border-slate-200 mt-8">
<div class="flex items-center justify-between bg-gradient-to-r from-slate-100 to-white px-6 py-4 rounded-lg shadow-sm">
<div class="flex items-center gap-3">
<i class="material-icons text-amber-600 text-3xl">auto_stories</i>
<span class="text-slate-700 font-medium text-lg">办学时间</span>
</div>
<div class="text-right">
<div class="text-slate-800 font-bold text-3xl">8年整</div>
<div class="text-slate-500 text-sm">1937-1946</div>
</div>
</div>
<div class="flex items-center justify-between bg-gradient-to-r from-blue-100 to-white px-6 py-4 rounded-lg shadow-sm mt-4">
<div class="flex items-center gap-3">
<i class="material-icons text-blue-600 text-3xl">groups</i>
<span class="text-slate-700 font-medium text-lg">培养人才</span>
</div>
<div class="text-right">
<div class="text-slate-800 font-bold text-3xl">2000余人</div>
<div class="text-slate-500 text-sm">毕业生总数</div>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
