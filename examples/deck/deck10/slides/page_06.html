<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>不朽的精神丰碑</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col bg-gradient-to-br from-slate-50 to-slate-100">
<div class="h-[80px] flex items-center px-16 border-b-2 border-slate-200">
<h1 class="title-font text-[40px] font-bold text-slate-800">不朽的精神丰碑</h1>
</div>
<div class="flex-grow flex items-center justify-center px-16 py-12">
<div class="max-w-4xl w-full space-y-8">
<div class="space-y-6">
<div class="bg-white p-8 rounded-xl shadow-lg border-l-4 border-slate-700">
<p class="text-slate-700 text-2xl leading-relaxed title-font">
西南联大在抗战最艰难的岁月里，坚持办学，传承文化，培养人才，体现了中国知识分子的家国情怀和民族气节。
</p>
</div>
</div>
<div class="bg-gradient-to-r from-amber-50 to-white p-8 rounded-xl shadow-lg border-l-4 border-amber-600">
<p class="text-slate-700 text-3xl font-bold leading-relaxed title-font text-center">
"所谓大学者，有大师之谓也！"
</p>
<p class="text-slate-500 text-base mt-4 text-center">——梅贻琦</p>
</div>
<div class="space-y-6">
<div class="bg-white p-8 rounded-xl shadow-lg border-l-4 border-blue-600">
<p class="text-slate-700 text-2xl leading-relaxed title-font">
西南联大以其卓越的办学成就和崇高的精神品格，成为中国高等教育史上的一座不朽丰碑。
</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
