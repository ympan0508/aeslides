<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>名师荟萃 大师云集</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }

    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col bg-gradient-to-br from-slate-50 to-slate-100">
<div class="h-[80px] flex items-center px-16 border-b-2 border-slate-200">

<h3 class="text-xl text-amber-700">文学院</h3>
</div>
<div class="grid grid-cols-3 gap-3 text-base">

</div>
<div class="bg-gradient-to-r from-blue-50 to-white rounded-lg p-6 border-l-4 border-blue-600">
<div class="flex items-center gap-2 mb-4">
<i class="material-icons text-blue-600 text-2xl">science</i>
<h3 class="text-xl text-blue-700">理学院</h3>
</div>
<div class="grid grid-cols-3 gap-3 text-base">
<p>吴有训</p>
<p>叶企孙</p>
<p>华罗庚</p>

</div>
<div class="bg-gradient-to-r from-green-50 to-white rounded-lg p-6 border-l-4 border-green-600">

<i class="material-icons text-green-600 text-2xl">business_center</i>
<h3 class="text-xl text-green-700">法商学院</h3>
</div>

<p>陈岱孙</p>

</div>
</div>
<div class="bg-gradient-to-r from-purple-50 to-white rounded-lg p-6 border-l-4 border-purple-600">
<div class="flex items-center gap-2 mb-4">
<i class="material-icons text-purple-600 text-2xl">engineering</i>
<h3 class="text-xl text-purple-700">工学院</h3>
</div>
<div class="grid grid-cols-2 gap-3 text-base">

</div>
<div class="mt-6 relative">
<img src="https://sfile.chatglm.cn/images-ppt/358f73c63fca.jpg" alt="西南联大教授群像" class="w-full h-[140px] object-cover rounded-lg shadow-md"/>
<div class="absolute top-2 right-2 bg-white/90 backdrop-blur-sm px-3 py-1 rounded text-xs text-slate-700">
Professorial Faculty
</div>
</div>
</div>
