<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ready to Transform Your Workflow?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <style type="text/tailwindcss">
        @layer utilities {
            .ppt-slide {
                @apply relative w-[1280px] min-h-[720px] mx-auto box-border overflow-hidden
            }
        }
    </style>
    <style>body {
    font-family: "Inter", sans-serif;
    background: #f0f0f0
    }
.primary-gradient {
    background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%)
    }
.cta-gradient {
    background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%)
    }
.cta-gradient:hover {
    background: linear-gradient(135deg, #6d28d9 0%, #db2777 100%)
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
    <div class="ppt-slide h-[720px] bg-gradient-to-br from-slate-900 via-blue-900 to-purple-900 flex flex-col justify-center items-center relative overflow-hidden">
        <!-- Background Pattern -->
        <div class="absolute inset-0 opacity-10">
            <div class="absolute top-0 left-0 w-full h-full" style="background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.5) 1px, transparent 0);
background-size: 40px 40px"></div>
        </div>
        
        <!-- Main Content -->
        <div class="relative z-10 text-center px-20 max-w-5xl">
            <!-- Icon -->
            <div class="flex justify-center mb-8">
                <div class="w-24 h-24 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center shadow-2xl">
                    <i class="material-icons text-white text-5xl">rocket_launch</i>
                </div>
            </div>
            
            <!-- Main Title -->
            <h1 class="text-[56px] font-extrabold text-white leading-tight mb-6">
                Ready to Transform Your <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400">Workflow?</span>
            </h1>
            
            <!-- Supporting Text -->
            <p class="text-xl text-gray-300 mb-10 leading-relaxed">
                Join professionals worldwide who are mastering AI prompt management and achieving remarkable efficiency gains with AI Prompt Lab
            </p>
            
            <!-- CTA Button -->
            <div class="mb-12">
                <button class="cta-gradient text-white text-2xl font-bold px-16 py-5 rounded-full shadow-2xl transition-all duration-300 transform hover:scale-105 flex items-center gap-3 mx-auto">
                    <i class="material-icons text-3xl">download</i>
                    Get AI Prompt Lab Today
                    <i class="material-icons text-3xl">arrow_forward</i>
                </button>
            </div>
            
            <!-- Contact Info -->
            <div class="flex items-center justify-center gap-8 text-gray-400 text-base">
                <div class="flex items-center gap-2">
                    <i class="material-icons text-purple-400">language</i>
                    <a href="https://ai-promptlab.com" class="hover:text-white transition-colors">www.ai-promptlab.com</a>
                </div>
                <div class="w-1 h-1 bg-gray-600 rounded-full"></div>
                <div class="flex items-center gap-2">
                    <i class="material-icons text-purple-400">email</i>
                    <span>hello@ai-promptlab.com</span>
                </div>
            </div>
        </div>
        
        <!-- Bottom Accent -->
        <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 via-purple-500 to-pink-500"></div>
    </div>
</body>
</html>
