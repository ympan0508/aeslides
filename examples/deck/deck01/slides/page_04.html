<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>画作概况</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Serif SC", serif;
    background: #f5f5f0
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col" style="background: #f4f1ea">
<!-- 顶部图片区域 -->
<div class="relative h-[45%] overflow-hidden">
<img alt="富春山居图全图" class="w-full h-full object-cover" src="https://sfile.chatglm.cn/images-ppt/de086bca2204.jpg"/>
<div class="absolute top-0 left-0 right-0 h-20" style="background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent)"></div>
<div class="absolute top-8 left-16">
<div class="flex items-center">
<div class="w-1 h-10 mr-3" style="background: #d4af37"></div>
<h2 class="title-font text-4xl font-bold" style="color: #f9f7f2">画作概况</h2>
</div>
</div>
</div>

<!-- 底部文字内容区域 -->
<div class="flex-grow flex flex-col justify-center px-16 py-8">
<div class="grid grid-cols-1 gap-6">
<!-- 基本信息 -->
<div class="flex items-start">
<i class="material-icons mr-4 mt-1" style="color: #d4af37;
font-size: 28px">palette</i>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-2" style="color: #2c3e50">基本信息</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">纸本水墨，原长约690公分，画在六张纸上接裱而成</p>
</div>
</div>

<!-- 画作历史 -->
<div class="flex items-start">
<i class="material-icons mr-4 mt-1" style="color: #d4af37;
font-size: 28px">local_fire_department</i>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-2" style="color: #2c3e50">画作历史</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">清初顺治年间，吴洪裕临终"焚画殉葬"，被其侄吴贞度从火中抢救，但已被烧成两段</p>
</div>
</div>

<!-- 现状与地位 -->
<div class="flex items-start">
<i class="material-icons mr-4 mt-1" style="color: #d4af37;
font-size: 28px">emoji_events</i>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-2" style="color: #2c3e50">艺术地位</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">前段"剩山图"藏浙江省博物馆，后段"无用师卷"藏台北故宫博物院。被誉为"画中之兰亭"、"中国山水画第一神品"</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
