<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>"模范党支部"战旗演讲PPT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 900
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col relative overflow-hidden" style="background: #FEFEFE">
<div class="h-[80px] flex items-center px-16" style="background: linear-gradient(90deg, #C8102E 0%, #8B0000 100%)">
<h1 class="title-font text-5xl text-white tracking-wider">战旗猎猎：血与火中铸就的胜利传奇</h1>
</div>

<div class="flex-grow flex h-[640px]">
<div class="w-[55%] flex flex-col justify-center px-16 py-8">
<div class="grid grid-cols-2 gap-6">
<div class="p-5 bg-gradient-to-br from-red-50 to-white rounded-lg shadow-lg border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">event</i>
<h3 class="font-bold text-xl text-gray-800">时间</h3>
</div>
<p class="text-gray-700 text-base font-medium">1942年5月30日</p>
</div>

<div class="p-5 bg-gradient-to-br from-red-50 to-white rounded-lg shadow-lg border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">account_balance</i>
<h3 class="font-bold text-xl text-gray-800">背景</h3>
</div>
<p class="text-gray-700 text-base font-medium">十字岭战斗后为左权报仇</p>
</div>

<div class="p-5 bg-gradient-to-br from-red-50 to-white rounded-lg shadow-lg border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">landscape</i>
<h3 class="font-bold text-xl text-gray-800">战术</h3>
</div>
<p class="text-gray-700 text-base font-medium">苏亭谷地"天然瓮城"伏击</p>
</div>

<div class="p-5 bg-gradient-to-br from-red-50 to-white rounded-lg shadow-lg border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">groups</i>
<h3 class="font-bold text-xl text-gray-800">战果</h3>
</div>
<p class="text-gray-700 text-base font-medium">仅伤亡2人，毙伤140余人</p>
</div>
</div>

<div class="mt-8 p-6 bg-white rounded-lg shadow-lg border-l-4 border-yellow-500">
<div class="flex items-start space-x-3">
<i class="material-icons text-yellow-500 text-3xl">format_quote</i>
<div>
<p class="text-gray-700 text-lg leading-relaxed italic">
"这是军民结合以极少代价换取大胜利的模范战斗"
</p>
<p class="text-red-700 font-bold text-base mt-2">— 刘伯承师长评价</p>
</div>
</div>
</div>
</div>

<div class="w-[45%] flex items-center justify-center p-8">
<div class="relative">
<img src="https://sfile.chatglm.cn/images-ppt/68a5e27920af.jpg" alt="八路军伏击战" class="w-full h-[520px] object-cover rounded-lg shadow-2xl"/>
<div class="absolute bottom-4 left-4 right-4 bg-black bg-opacity-60 backdrop-blur-sm rounded-lg p-4">
<p class="text-white text-center font-bold text-lg">军民协同作战</p>
<p class="text-gray-200 text-sm text-center">地雷、滚石、火力交织</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
