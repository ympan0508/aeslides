<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>"模范党支部"战旗演讲PPT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 900
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col relative overflow-hidden" style="background: #FEFEFE">
<div class="h-[80px] flex items-center px-16" style="background: linear-gradient(90deg, #C8102E 0%, #8B0000 100%)">
<h1 class="title-font text-5xl text-white tracking-wider">战旗永驻：精神不朽的时代回响</h1>
</div>

<div class="flex-grow flex h-[640px]">
<div class="w-[60%] flex flex-col justify-center px-16 py-8">
<div class="mb-8">
<div class="flex items-center mb-5">
<i class="material-icons text-red-700 text-4xl mr-3">history_edu</i>
<h2 class="text-3xl font-bold text-gray-800">战旗传承</h2>
</div>
<div class="grid grid-cols-3 gap-4">
<div class="p-4 bg-white rounded-lg shadow-md border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">waving_hand</i>
<h3 class="font-bold text-xl text-gray-800">日常宣誓</h3>
</div>
<p class="text-gray-600 text-base">每天出操前向战旗庄严宣誓</p>
</div>

<div class="p-4 bg-white rounded-lg shadow-md border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">museum</i>
<h3 class="font-bold text-xl text-gray-800">入连第一课</h3>
</div>
<p class="text-gray-600 text-base">参观连史馆聆听苏亭伏击战故事</p>
</div>

<div class="p-4 bg-white rounded-lg shadow-md border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">forum</i>
<h3 class="font-bold text-xl text-gray-800">战前议战</h3>
</div>
<p class="text-gray-600 text-base">重大任务前召开"战旗前议战会"</p>
</div>
</div>
</div>

<div>
<div class="flex items-center mb-5">
<i class="material-icons text-red-700 text-4xl mr-3">auto_stories</i>
<h2 class="text-3xl font-bold text-gray-800">精神指引</h2>
</div>
<div class="p-5 bg-gradient-to-br from-red-50 to-white rounded-lg shadow-lg border-l-4 border-yellow-500">
<p class="text-gray-700 text-lg leading-relaxed">
战旗精神为全体新时代革命军人提供宝贵指引，激励我们在新时代的战场上不忘初心、勇担使命，续写新的胜利篇章
</p>
</div>
</div>
</div>

<div class="w-[40%] flex items-center justify-center p-8">
<div class="relative">
<img src="https://sfile.chatglm.cn/images-ppt/1999f674d634.jpg" alt="抗洪救灾" class="w-full h-[520px] object-cover rounded-lg shadow-2xl"/>
<div class="absolute -bottom-4 -right-4 bg-red-700 text-white px-5 py-3 rounded-lg shadow-lg">
<p class="font-bold text-lg">传承红色基因</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
