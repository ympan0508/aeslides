<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>创作背景</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Serif SC", serif;
    background: #f5f5f0
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col" style="background: #f4f1ea">
<!-- 顶部图片区域 -->
<div class="relative h-[35%] overflow-hidden">
<img alt="富春江风景" class="w-full h-full object-cover" src="https://sfile.chatglm.cn/images-ppt/4905bab455c3.jpg"/>
<div class="absolute bottom-0 left-0 right-0 h-16" style="background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent)"></div>
<div class="absolute bottom-12 left-16">
<div class="flex items-center mb-2">
<div class="w-1 h-8 mr-3" style="background: #d4af37"></div>
<h2 class="title-font text-4xl font-bold" style="color: #f9f7f2">创作背景</h2>
</div>
</div>
</div>

<!-- 底部文字内容区域 -->
<div class="flex-grow flex flex-col justify-center px-16 py-8">
<div class="grid grid-cols-3 gap-8">
<!-- 时代背景 -->
<div class="flex flex-col">
<div class="flex items-center mb-4">
<i class="material-icons mr-3" style="color: #d4af37;
font-size: 32px">public</i>
<h3 class="title-font text-2xl font-semibold" style="color: #2c3e50">时代背景</h3>
</div>
<div class="h-px my-3" style="background: #d4af37;
opacity: 0.4"></div>
<p class="text-lg leading-relaxed" style="color: #5a6c7a">元代后期，汉人沦为"四等公民"，文人画家寄情山水</p>
</div>

<!-- 创作缘起 -->
<div class="flex flex-col">
<div class="flex items-center mb-4">
<i class="material-icons mr-3" style="color: #d4af37;
font-size: 32px">location_on</i>
<h3 class="title-font text-2xl font-semibold" style="color: #2c3e50">创作缘起</h3>
</div>
<div class="h-px my-3" style="background: #d4af37;
opacity: 0.4"></div>
<p class="text-lg leading-relaxed" style="color: #5a6c7a">至正七年（1347年），79岁的黄公望归隐富春山，与师弟无用禅师同往</p>
</div>

<!-- 创作过程 -->
<div class="flex flex-col">
<div class="flex items-center mb-4">
<i class="material-icons mr-3" style="color: #d4af37;
font-size: 32px">auto_graph</i>
<h3 class="title-font text-2xl font-semibold" style="color: #2c3e50">创作过程</h3>
</div>
<div class="h-px my-3" style="background: #d4af37;
opacity: 0.4"></div>
<p class="text-lg leading-relaxed" style="color: #5a6c7a">历时7年（1347-1350年）终日奔波于富春江观察写生，至正十年（1350年）83岁时作题跋</p>
</div>
</div>
</div>
</div>
</body>
</html>
