<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>El Sueño Cumplido</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Montserrat", sans-serif;
    background: #0a0a0a
    }
.title-font {
    font-family: "Bebas Neue", sans-serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] relative overflow-hidden">
<div class="absolute inset-0">
<img alt="Messi levantando la Copa del Mundo" class="w-full h-full object-cover" src="https://sfile.chatglm.cn/images-ppt/5ba2cad1fa5e.jpg"/>
<div class="absolute inset-0 bg-gradient-to-b from-blue-900/85 via-blue-800/80 to-black/90"></div>
</div>
<div class="relative z-10 h-full flex flex-col items-center justify-center px-20">
<div class="text-center mb-8">
<h1 class="title-font text-6xl font-bold text-white leading-tight mb-4">
EL SUEÑO CUMPLIDO
</h1>
<div class="h-1 w-48 bg-gradient-to-r from-transparent via-blue-400 to-transparent mx-auto"></div>
</div>
<div class="grid grid-cols-2 gap-8 max-w-4xl w-full mb-10">
<div class="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-blue-400/30">
<div class="flex items-center gap-4 mb-3">
<i class="material-icons text-blue-300 text-5xl">emoji_events</i>
<div>
<p class="text-blue-300/80 text-sm uppercase tracking-wider">Copa América 2021</p>
<p class="text-white text-3xl font-bold">Primer Título Oficial</p>
</div>
</div>
</div>
<div class="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-blue-400/30">
<div class="flex items-center gap-4 mb-3">
<i class="material-icons text-blue-300 text-5xl">military_tech</i>
<div>
<p class="text-blue-300/80 text-sm uppercase tracking-wider">Mundial Qatar 2022</p>
<p class="text-white text-3xl font-bold">Campeón del Mundo</p>
</div>
</div>
</div>
</div>
<div class="grid grid-cols-3 gap-6 max-w-3xl w-full mb-10">
<div class="bg-gradient-to-br from-blue-500/20 to-blue-600/20 backdrop-blur-sm rounded-xl p-5 border border-blue-400/30">
<p class="text-blue-300/80 text-xs uppercase tracking-wider mb-2">Goles en el Mundial</p>
<p class="title-font text-5xl font-bold text-white">7</p>
</div>
<div class="bg-gradient-to-br from-blue-500/20 to-blue-600/20 backdrop-blur-sm rounded-xl p-5 border border-blue-400/30">
<p class="text-blue-300/80 text-xs uppercase tracking-wider mb-2">Asistencias</p>
<p class="title-font text-5xl font-bold text-white">3</p>
</div>
<div class="bg-gradient-to-br from-blue-500/20 to-blue-600/20 backdrop-blur-sm rounded-xl p-5 border border-blue-400/30">
<p class="text-blue-300/80 text-xs uppercase tracking-wider mb-2">Premios al mejor jugador</p>
<p class="title-font text-5xl font-bold text-white">5</p>
</div>
</div>
<div class="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-blue-400/30">
<div class="flex items-center gap-4">
<i class="material-icons text-blue-300 text-5xl">workspace_premium</i>
<div>
<p class="text-blue-300/80 text-sm uppercase tracking-wider mb-1">Segundo Balón de Oro del Mundial</p>
<p class="text-white text-2xl font-bold">2022</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
