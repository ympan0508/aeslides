<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>刚毅坚卓的办学精神</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide min-h-[720px] flex flex-col bg-gradient-to-br from-slate-50 to-slate-100 relative overflow-hidden">
<div class="absolute inset-0">
<img src="https://sfile.chatglm.cn/images-ppt/980dcacb9c7f.jpg" alt="西南联大纪念碑" class="w-full h-full object-cover opacity-15"/>
<div class="absolute inset-0 bg-gradient-to-br from-slate-900/90 via-slate-800/85 to-slate-900/90"></div>
</div>
<div class="relative z-10 h-[80px] flex items-center px-16 border-b border-white/20">
<h1 class="title-font text-[42px] font-bold text-white">刚毅坚卓的办学精神</h1>
</div>
<div class="relative z-10 flex-grow flex flex-col justify-center px-16 py-10">
<div class="grid grid-cols-2 gap-8">
<div class="bg-white/10 backdrop-blur-md rounded-xl p-8 border border-white/20">
<div class="flex items-center gap-4 mb-4">
<i class="material-icons text-yellow-400 text-4xl">stars</i>
<h3 class="text-xl font-bold text-white">校训</h3>
</div>
<p class="text-yellow-300 text-3xl font-semibold title-font">刚毅坚卓</p>
<p class="text-white/70 text-base mt-2">Modesty and Fortitude</p>
</div>
<div class="bg-white/10 backdrop-blur-md rounded-xl p-8 border border-white/20">
<div class="flex items-center gap-4 mb-4">
<i class="material-icons text-yellow-400 text-4xl">psychology</i>
<h3 class="text-xl font-bold text-white">办学理念</h3>
</div>
<p class="text-white text-2xl font-medium leading-relaxed">独立之精神<br/>自由之思想</p>
<p class="text-white/70 text-base mt-2">Intellectual Freedom</p>
</div>
<div class="bg-white/10 backdrop-blur-md rounded-xl p-8 border border-white/20">
<div class="flex items-center gap-4 mb-4">
<i class="material-icons text-yellow-400 text-4xl">groups</i>
<h3 class="text-xl font-bold text-white">管理模式</h3>
</div>
<p class="text-white text-2xl font-medium leading-relaxed">教授治校<br/>学术自由</p>
<p class="text-white/70 text-base mt-2">Professor-led Governance</p>
</div>
<div class="bg-white/10 backdrop-blur-md rounded-xl p-8 border border-white/20">
<div class="flex items-center gap-4 mb-4">
<i class="material-icons text-yellow-400 text-4xl">school</i>
<h3 class="text-xl font-bold text-white">教育方针</h3>
</div>
<p class="text-white text-2xl font-medium leading-relaxed">通才教育<br/>严格训练</p>
<p class="text-white/70 text-base mt-2">Comprehensive Education</p>
</div>
</div>
</div>
<div class="relative z-10 pb-6 px-16">
<div class="flex items-center justify-center gap-3 bg-yellow-400/20 backdrop-blur-sm rounded-lg px-6 py-4">
<i class="material-icons text-yellow-400 text-3xl">school</i>
<p class="text-white/90 text-lg font-light">"所谓大学者，非有大楼之谓也，有大师之谓也"</p>
</div>
</div>
</div>
</body>
</html>
