<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>富春山居图鉴赏</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Serif SC", serif;
    background: #f5f5f0
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide flex flex-col justify-center items-center h-[720px]" style="background: #f4f1ea">
<div class="absolute top-0 left-0 w-full h-full">
<img alt="富春山居图意境背景" class="w-full h-full object-cover" src="https://sfile.chatglm.cn/images-ppt/6c86150b9bed.jpg"/>
<div class="absolute top-0 left-0 w-full h-full" style="background: rgba(20, 20, 20, 0.4);
backdrop-filter: blur(3px)"></div>
</div>

<div class="relative z-10 text-center px-20 flex flex-col items-center justify-center">
<div class="mb-8">
<i class="material-icons" style="font-size: 64px;
color: #d4af37">brush</i>
</div>
<h1 class="title-font text-7xl font-bold mb-8 leading-tight tracking-wide" style="color: #f9f7f2;
letter-spacing: 0.1em">
《富春山居图》鉴赏
</h1>
<div class="w-48 h-0.5 mx-auto mb-8" style="background: linear-gradient(to right, transparent, #d4af37, transparent)"></div>
<p class="text-2xl font-normal tracking-widest" style="color: #e0d4bc;
font-family: "Noto Serif SC", serif">
中国山水画第一神品
</p>
<p class="text-lg mt-6 tracking-wide" style="color: #c9c4b8">
元·黄公望 / 昔日画卷 · 当代重读
</p>
</div>

<div class="absolute bottom-16 left-0 right-0 z-10">
<div class="flex justify-center items-center">
<div class="px-4 py-1 border border-opacity-30 rounded-sm" style="border-color: #d4af37;
background: rgba(0, 0, 0, 0.2)">
<p class="text-sm" style="color: #e8e4d8;
font-family: "Noto Serif SC", serif">美术鉴赏课程资料</p>
</div>
</div>
</div>
</div>
</body>
</html>
