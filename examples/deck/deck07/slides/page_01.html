<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>La Carrera de Lionel Messi</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Montserrat", sans-serif;
    background: #0a0a0a
    }
.title-font {
    font-family: "Bebas Neue", sans-serif
    }
.argentina-gradient {
    background: linear-gradient(135deg, #75AADB 0%, #ffffff 50%, #C92A2A 100%)
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide flex items-center justify-center h-[720px]">
<div class="absolute inset-0 z-0">
<img alt="Messi levantando la Copa del Mundo" class="w-full h-full object-cover" src="https://sfile.chatglm.cn/images-ppt/5ba2cad1fa5e.jpg"/>
<div class="absolute inset-0 bg-gradient-to-br from-blue-900/85 via-blue-800/80 to-black/75"></div>
</div>
<div class="absolute top-8 right-8 z-10">
<div class="flex items-center gap-2 bg-white/10 backdrop-blur-sm px-4 py-2 rounded-full">
<i class="material-icons text-white text-2xl">emoji_events</i>
<span class="text-white font-bold text-lg">Campeón del Mundo 2022</span>
</div>
</div>
<div class="relative z-10 text-center px-20 max-w-6xl">
<div class="mb-8">
<div class="inline-block bg-white/10 backdrop-blur-md px-6 py-2 rounded-full border border-white/20">
<p class="text-white/90 text-xl font-semibold tracking-wider">LA HISTORIA DE UN GENIO</p>
</div>
</div>
<h1 class="title-font text-7xl font-bold text-white leading-tight mb-6 tracking-wide" style="text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.5)">
LA CARRERA DE<br/>LIONEL MESSI
</h1>
<div class="flex items-center justify-center gap-4 mb-8">
<div class="h-0.5 w-32 bg-gradient-to-r from-transparent via-white/60 to-transparent"></div>
<i class="material-icons text-white/80 text-3xl">sports_soccer</i>
<div class="h-0.5 w-32 bg-gradient-to-r from-transparent via-white/60 to-transparent"></div>
</div>
<h2 class="text-2xl font-light text-white/95 tracking-widest uppercase mb-12">
De Rosario al Olimpo del Fútbol
</h2>
<div class="grid grid-cols-4 gap-6 mt-12">
<div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 border border-white/20">
<p class="text-white/70 text-sm mb-1">Partidos</p>
<p class="title-font text-3xl font-bold text-white">1105</p>
</div>
<div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 border border-white/20">
<p class="text-white/70 text-sm mb-1">Goles</p>
<p class="title-font text-3xl font-bold text-white">856</p>
</div>
<div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 border border-white/20">
<p class="text-white/70 text-sm mb-1">Balones de Oro</p>
<p class="title-font text-3xl font-bold text-white">8</p>
</div>
<div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 border border-white/20">
<p class="text-white/70 text-sm mb-1">Títulos</p>
<p class="title-font text-3xl font-bold text-white">44</p>
</div>
</div>
</div>
</div>
</body>
</html>
