<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>"模范党支部"战旗演讲PPT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 900
    }
.motto-font {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 700
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col justify-center items-center relative overflow-hidden" style="background: linear-gradient(rgba(200, 16, 46, 0.75), rgba(139, 0, 0, 0.85)), url(https://sfile.chatglm.cn/images-ppt/f2fbd2ffad4c.png);
background-size: cover;
background-position: center">
<div class="absolute inset-0" style="background: rgba(0, 0, 0, 0.3)"></div>
<div class="relative z-10 text-center px-12 flex flex-col items-center justify-center">
<div class="mb-8">
<div class="inline-block p-4 bg-white bg-opacity-10 backdrop-blur-sm rounded-full">
<i class="material-icons text-yellow-400 text-6xl">workspace_premium</i>
</div>
</div>

<h2 class="title-font text-5xl text-white tracking-wider mb-12">战旗精神的核心内涵</h2>

<div class="grid grid-cols-2 gap-8 max-w-5xl">
<div class="p-8 bg-white bg-opacity-15 backdrop-blur-md rounded-2xl shadow-2xl border border-white border-opacity-30">
<p class="motto-font text-4xl text-yellow-300 leading-relaxed tracking-wide">支部坚强如钢</p>
<div class="mt-4 h-1 bg-gradient-to-r from-transparent via-yellow-400 to-transparent"></div>
<p class="text-white text-lg mt-3 font-medium">战斗堡垒始终坚强有力</p>
</div>

<div class="p-8 bg-white bg-opacity-15 backdrop-blur-md rounded-2xl shadow-2xl border border-white border-opacity-30">
<p class="motto-font text-4xl text-yellow-300 leading-relaxed tracking-wide">党员冲锋在前</p>
<div class="mt-4 h-1 bg-gradient-to-r from-transparent via-yellow-400 to-transparent"></div>
<p class="text-white text-lg mt-3 font-medium">关键时刻党员干部挺身而出</p>
</div>

<div class="p-8 bg-white bg-opacity-15 backdrop-blur-md rounded-2xl shadow-2xl border border-white border-opacity-30">
<p class="motto-font text-4xl text-yellow-300 leading-relaxed tracking-wide">军民同心如磐</p>
<div class="mt-4 h-1 bg-gradient-to-r from-transparent via-yellow-400 to-transparent"></div>
<p class="text-white text-lg mt-3 font-medium">紧紧依靠人民群众的力量</p>
</div>

<div class="p-8 bg-white bg-opacity-15 backdrop-blur-md rounded-2xl shadow-2xl border border-white border-opacity-30">
<p class="motto-font text-4xl text-yellow-300 leading-relaxed tracking-wide">忠诚使命如铁</p>
<div class="mt-4 h-1 bg-gradient-to-r from-transparent via-yellow-400 to-transparent"></div>
<p class="text-white text-lg mt-3 font-medium">永远听党话跟党走保家卫</p>
</div>
</div>

<div class="mt-16">
<p class="text-white text-2xl font-bold tracking-wider">这十六字，既是制胜密码，更是精神财富</p>
</div>
</div>
</div>
</body>
</html>
