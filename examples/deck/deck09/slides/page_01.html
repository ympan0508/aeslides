<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>"模范党支部"战旗演讲PPT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 900
    }
.subtitle-font {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 700
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col justify-center items-center relative overflow-hidden" style="background: linear-gradient(rgba(200, 16, 46, 0.75), rgba(139, 0, 0, 0.85)), url(https://sfile.chatglm.cn/images-ppt/c467deda31fa.png);
background-size: cover;
background-position: center">
<div class="absolute inset-0" style="background: linear-gradient(135deg, rgba(200, 16, 46, 0.85) 0%, rgba(139, 0, 0, 0.9) 100%)"></div>
<div class="absolute inset-0 opacity-10">
<div class="absolute top-0 left-0 w-96 h-96 bg-yellow-400 rounded-full blur-3xl"></div>
<div class="absolute bottom-0 right-0 w-96 h-96 bg-yellow-400 rounded-full blur-3xl"></div>
</div>
<div class="relative z-10 text-center px-20 flex flex-col items-center justify-center">
<div class="mb-8">
<div class="inline-block p-3 bg-gold-400 rounded-lg bg-opacity-20 backdrop-blur-sm border-2 border-yellow-400">
<i class="material-icons text-yellow-400 text-6xl">flag</i>
</div>
</div>
<h1 class="title-font text-7xl font-black text-white leading-tight mb-6 tracking-wide" style="text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5)">
"模范党支部"战旗
</h1>
<div class="w-80 h-1 mx-auto mb-6 bg-gradient-to-r from-transparent via-yellow-400 to-transparent"></div>
<h2 class="subtitle-font text-3xl text-yellow-300 mb-12 tracking-wider">
永不褪色的精神丰碑
</h2>
<p class="text-2xl text-white font-medium tracking-widest bg-red-900 bg-opacity-30 px-10 py-4 rounded-lg border border-red-400 border-opacity-50 backdrop-blur-sm">
党支部建设模范红三连的光辉历程
</p>
</div>
<div class="absolute bottom-12 left-0 right-0 z-10">
<div class="flex justify-center items-center">
<div class="flex items-center space-x-8 text-white text-base">
<div class="flex items-center space-x-2">
<i class="material-icons text-yellow-400">military_tech</i>
<span>1927-2024</span>
</div>
<div class="w-1 h-4 bg-white opacity-40"></div>
<div class="flex items-center space-x-2">
<i class="material-icons text-yellow-400">groups</i>
<span>党支部建在连上</span>
</div>
<div class="w-1 h-4 bg-white opacity-40"></div>
<div class="flex items-center space-x-2">
<i class="material-icons text-yellow-400">stars</i>
<span>全军基层建设标兵</span>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
