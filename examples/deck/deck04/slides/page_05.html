<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>API Endpoints Overview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <style type="text/tailwindcss">
        @layer utilities {
            .ppt-slide {
                @apply relative w-[1280px] min-h-[720px] mx-auto box-border overflow-hidden
            }
        }
    </style>
    <style>body {
    font-family: "Inter", sans-serif;
    background: #f8fafc
    }
.category-card {
    background: white;
    transition: all 0.3s ease
    }
.category-card:hover {
    transform: translatey(-5px);
    box-shadow: 0 20px 40px rgba(37, 99, 235, 0.15)
    }
.method-badge {
    font-family: "Inter", sans-serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
    <div class="ppt-slide h-[720px] bg-gradient-to-br from-slate-50 to-blue-50">
        <!-- Header -->
        <div class="h-[80px] flex items-center px-16 border-b border-blue-100">
            <h1 class="text-[40px] font-bold text-blue-900">API Endpoints Overview</h1>
        </div>
        
        <!-- Main Content -->
        <div class="flex h-[640px]">
            <!-- Left Content -->
            <div class="w-3/5 flex flex-col justify-center pl-16 pr-8">
                <!-- Category 1: Market Data -->
                <div class="category-card rounded-xl p-5 mb-4 border-t-4 border-blue-500">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                            <i class="material-icons text-blue-600 text-[24px]">insights</i>
                        </div>
                        <h3 class="text-[24px] font-bold text-slate-800">Market Data</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="flex items-center gap-2 bg-slate-50 rounded-lg p-2">
                            <span class="method-badge px-2 py-1 bg-blue-600 text-white text-[14px] font-bold rounded">GET</span>
                            <code class="text-[16px] text-slate-700">/ticker</code>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-50 rounded-lg p-2">
                            <span class="method-badge px-2 py-1 bg-blue-600 text-white text-[14px] font-bold rounded">GET</span>
                            <code class="text-[16px] text-slate-700">/orderbook</code>
                        </div>
                    </div>
                </div>
                
                <!-- Category 2: Trading -->
                <div class="category-card rounded-xl p-5 mb-4 border-t-4 border-purple-500">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                            <i class="material-icons text-purple-600 text-[24px]">trending_up</i>
                        </div>
                        <h3 class="text-[24px] font-bold text-slate-800">Trading</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="flex items-center gap-2 bg-slate-50 rounded-lg p-2">
                            <span class="method-badge px-2 py-1 bg-purple-600 text-white text-[14px] font-bold rounded">POST</span>
                            <code class="text-[16px] text-slate-700">/order</code>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-50 rounded-lg p-2">
                            <span class="method-badge px-2 py-1 bg-purple-600 text-white text-[14px] font-bold rounded">DELETE</span>
                            <code class="text-[16px] text-slate-700">/order</code>
                        </div>
                    </div>
                </div>
                
                <!-- Category 3: Wallet Management -->
                <div class="category-card rounded-xl p-5 border-t-4 border-green-500">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
                            <i class="material-icons text-green-600 text-[24px]">account_balance_wallet</i>
                        </div>
                        <h3 class="text-[24px] font-bold text-slate-800">Wallet Management</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="flex items-center gap-2 bg-slate-50 rounded-lg p-2">
                            <span class="method-badge px-2 py-1 bg-green-600 text-white text-[14px] font-bold rounded">GET</span>
                            <code class="text-[16px] text-slate-700">/balance</code>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-50 rounded-lg p-2">
                            <span class="method-badge px-2 py-1 bg-green-600 text-white text-[14px] font-bold rounded">POST</span>
                            <code class="text-[16px] text-slate-700">/withdraw</code>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right Content -->
            <div class="w-2/5 flex flex-col justify-center pr-16 pl-8">
                <div class="bg-white rounded-2xl shadow-2xl p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-3 h-3 rounded-full bg-red-400"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                        <div class="w-3 h-3 rounded-full bg-green-400"></div>
                        <span class="text-sm text-slate-400 ml-2">API Connection Diagram</span>
                    </div>
                    <img src="https://sfile.chatglm.cn/images-ppt/68748781aff1.png" alt="API Connection Diagram" class="w-full h-[420px] object-cover rounded-lg shadow-inner"/>
                    
                    <!-- Quick Reference -->
                    <div class="mt-5 flex items-center gap-3 bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg p-3">
                        <i class="material-icons text-blue-600 text-[24px]">library_books</i>
                        <span class="text-[18px] font-semibold text-slate-700">Full API reference available in documentation</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
