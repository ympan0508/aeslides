<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Legado y Récords</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Montserrat", sans-serif;
    background: #0a0a0a
    }
.title-font {
    font-family: "Bebas Neue", sans-serif
    }
.gold-gradient {
    background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%)
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] bg-gradient-to-br from-blue-900 via-blue-800 to-black">
<div class="h-full flex flex-col justify-center px-16 py-8">
<div class="text-center mb-10">
<h1 class="title-font text-6xl font-bold text-white mb-2">LEGADO Y RÉCORDS</h1>
<div class="h-1 w-48 bg-gradient-to-r from-transparent via-blue-400 to-transparent mx-auto"></div>
<p class="text-white/70 text-lg mt-4">Estadísticas que definen a un genio</p>
</div>
<div class="grid grid-cols-3 gap-6 mb-10">
<div class="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-blue-400/30 text-center">
<div class="flex justify-center mb-3">
<i class="material-icons text-blue-300 text-5xl">sports_soccer</i>
</div>
<p class="text-blue-300/80 text-sm uppercase tracking-wider mb-2">Partidos</p>
<p class="title-font text-6xl font-bold text-white">1105</p>
</div>
<div class="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-blue-400/30 text-center">
<div class="flex justify-center mb-3">
<i class="material-icons text-blue-300 text-5xl">emoji_events</i>
</div>
<p class="text-blue-300/80 text-sm uppercase tracking-wider mb-2">Goles</p>
<p class="title-font text-6xl font-bold text-white">856</p>
</div>
<div class="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-blue-400/30 text-center">
<div class="flex justify-center mb-3">
<i class="material-icons text-blue-300 text-5xl">assist</i>
</div>
<p class="text-blue-300/80 text-sm uppercase tracking-wider mb-2">Asistencias</p>
<p class="title-font text-6xl font-bold text-white">418</p>
</div>
</div>
<div class="grid grid-cols-4 gap-6">
<div class="bg-gradient-to-br from-blue-500/20 to-blue-600/20 backdrop-blur-sm rounded-xl p-5 border border-blue-400/30">
<div class="flex justify-center mb-2">
<i class="material-icons text-blue-300 text-4xl">workspace_premium</i>
</div>
<p class="text-blue-300/80 text-xs uppercase tracking-wider mb-2">Balones de Oro</p>
<p class="title-font text-5xl font-bold text-white">8</p>
<p class="text-white/70 text-sm mt-1">Récord histórico</p>
</div>
<div class="bg-gradient-to-br from-blue-500/20 to-blue-600/20 backdrop-blur-sm rounded-xl p-5 border border-blue-400/30">
<div class="flex justify-center mb-2">
<i class="material-icons text-blue-300 text-4xl">star</i>
</div>
<p class="text-blue-300/80 text-xs uppercase tracking-wider mb-2">Botas de Oro</p>
<p class="title-font text-5xl font-bold text-white">6</p>
</div>
<div class="bg-gradient-to-br from-blue-500/20 to-blue-600/20 backdrop-blur-sm rounded-xl p-5 border border-blue-400/30">
<div class="flex justify-center mb-2">
<i class="material-icons text-blue-300 text-4xl">emoji_events</i>
</div>
<p class="text-blue-300/80 text-xs uppercase tracking-wider mb-2">Títulos Colectivos</p>
<p class="title-font text-5xl font-bold text-white">44</p>
</div>
<div class="bg-gradient-to-br from-blue-500/20 to-blue-600/20 backdrop-blur-sm rounded-xl p-5 border border-blue-400/30">
<div class="flex justify-center mb-2">
<i class="material-icons text-blue-300 text-4xl">stars</i>
</div>
<p class="text-blue-300/80 text-xs uppercase tracking-wider mb-2">Títulos Individuales</p>
<p class="title-font text-5xl font-bold text-white">50+</p>
</div>
</div>
</div>
</div>
</body>
</html>
