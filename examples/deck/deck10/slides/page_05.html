<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>桃李天下 人才辈出</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col bg-gradient-to-br from-slate-50 to-slate-100">
<div class="h-[80px] flex items-center px-16 border-b-2 border-slate-200">
<h1 class="title-font text-[40px] font-bold text-slate-800">桃李天下 人才辈出</h1>
</div>
<div class="flex-grow flex items-stretch h-[640px]">
<div class="w-[55%] flex flex-col justify-center px-16 py-8">
<div class="space-y-5">
<div class="flex items-center justify-between bg-gradient-to-r from-amber-50 to-white rounded-lg p-4 border-l-4 border-amber-600">
<div class="flex items-center gap-3">
<i class="material-icons text-amber-600 text-3xl">emoji_events</i>
<span class="text-slate-700 font-medium text-lg">诺贝尔奖获得者</span>
</div>
<div class="text-amber-700 font-bold text-3xl">2位</div>
</div>
<div class="flex items-center justify-between bg-gradient-to-r from-blue-50 to-white rounded-lg p-4 border-l-4 border-blue-600">
<div class="flex items-center gap-3">
<i class="material-icons text-blue-600 text-3xl">rocket_launch</i>
<span class="text-slate-700 font-medium text-lg">"两弹一星"功勋</span>
</div>
<div class="text-blue-700 font-bold text-3xl">8位</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex items-center justify-between bg-gradient-to-r from-indigo-50 to-white rounded-lg p-4 border-l-4 border-indigo-600">
<div class="flex items-center gap-2">
<i class="material-icons text-indigo-600 text-2xl">account_balance</i>
<span class="text-slate-700 font-medium">中科院院士</span>
</div>
<div class="text-indigo-700 font-bold text-2xl">82位</div>
</div>
<div class="flex items-center justify-between bg-gradient-to-r from-teal-50 to-white rounded-lg p-4 border-l-4 border-teal-600">
<div class="flex items-center gap-2">
<i class="material-icons text-teal-600 text-2xl">science</i>
<span class="text-slate-700 font-medium">工程院院士</span>
</div>
<div class="text-teal-700 font-bold text-2xl">13位</div>
</div>
</div>
<div class="bg-gradient-to-r from-slate-100 to-white rounded-lg p-4 border-l-4 border-slate-600">
<div class="flex items-center gap-2 mb-2">
<i class="material-icons text-slate-600 text-2xl">auto_stories</i>
<span class="text-slate-700 font-medium">文学家艺术家</span>
</div>
<div class="text-slate-600 text-lg">汪曾祺等众多校友</div>
</div>
</div>
</div>
<div class="w-[45%] flex flex-col justify-center pr-16 py-8">
<div class="relative">
<img src="https://sfile.chatglm.cn/images-ppt/e67cfb1b784b.jpg" alt="杨振宁、李政道" class="w-full h-[520px] object-cover rounded-lg shadow-2xl"/>
<div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-4 rounded-b-lg">
<p class="text-white text-sm font-light">1949年，芝加哥大学合影</p>
</div>
</div>
</div>
</div>
</div>

</html>
