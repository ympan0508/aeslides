<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>艺术意义与影响</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Serif SC", serif;
    background: #f5f5f0
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col justify-center items-center relative overflow-hidden" style="background: #f4f1ea">
<!-- 背景图片 -->
<div class="absolute top-0 left-0 w-full h-full">
<img alt="富春山居图意境背景" class="w-full h-full object-cover" src="https://sfile.chatglm.cn/images-ppt/72669348986a.jpg"/>
<div class="absolute top-0 left-0 w-full h-full" style="background: rgba(44, 62, 80, 0.65)"></div>
</div>

<!-- 主要内容区域 -->
<div class="relative z-10 w-full px-20">
<div class="mb-10">
<h2 class="title-font text-5xl font-bold text-center" style="color: #f9f7f2;
letter-spacing: 0.1em">艺术意义与影响</h2>
<div class="w-32 h-1 mx-auto mt-4" style="background: #d4af37"></div>
</div>

<div class="grid grid-cols-2 gap-8 max-w-6xl mx-auto">
<!-- 艺术地位 -->
<div class="bg-white bg-opacity-15 backdrop-blur-sm rounded-2xl p-6 border border-opacity-20" style="border-color: rgba(255, 255, 255, 0.2)">
<div class="flex items-start mb-4">
<i class="material-icons mr-3" style="color: #d4af37;
font-size: 32px">emoji_events</i>
<h3 class="text-xl font-semibold" style="color: #f9f7f2">艺术地位</h3>
</div>
<div class="space-y-2">
<p class="text-base leading-relaxed" style="color: #e8e4d8">与王羲之《兰亭序》在书法界地位媲美</p>
<p class="text-base leading-relaxed" style="color: #e8e4d8">被誉为"画中之兰亭"、"中国山水画第一神品"</p>
</div>
</div>

<!-- 技法创新 -->
<div class="bg-white bg-opacity-15 backdrop-blur-sm rounded-2xl p-6 border border-opacity-20" style="border-color: rgba(255, 255, 255, 0.2)">
<div class="flex items-start mb-4">
<i class="material-icons mr-3" style="color: #d4af37;
font-size: 32px">trending_up</i>
<h3 class="text-xl font-semibold" style="color: #f9f7f2">技法创新</h3>
</div>
<div class="space-y-2">
<p class="text-base leading-relaxed" style="color: #e8e4d8">兼具宋代写实和元代写意特点</p>
<p class="text-base leading-relaxed" style="color: #e8e4d8">工笔和写意兼备、重形按神</p>
</div>
</div>

<!-- 文化内涵 -->
<div class="bg-white bg-opacity-15 backdrop-blur-sm rounded-2xl p-6 border border-opacity-20" style="border-color: rgba(255, 255, 255, 0.2)">
<div class="flex items-start mb-4">
<i class="material-icons mr-3" style="color: #d4af37;
font-size: 32px">auto_awesome</i>
<h3 class="text-xl font-semibold" style="color: #f9f7f2">文化内涵</h3>
</div>
<div class="space-y-2">
<p class="text-base leading-relaxed" style="color: #e8e4d8">以道家哲学为设计理念</p>
<p class="text-base leading-relaxed" style="color: #e8e4d8">表现"以山水之形，寄物之神"之美</p>
</div>
</div>

<!-- 深远影响 -->
<div class="bg-white bg-opacity-15 backdrop-blur-sm rounded-2xl p-6 border border-opacity-20" style="border-color: rgba(255, 255, 255, 0.2)">
<div class="flex items-start mb-4">
<i class="material-icons mr-3" style="color: #d4af37;
font-size: 32px">timeline</i>
<h3 class="text-xl font-semibold" style="color: #f9f7f2">深远影响</h3>
</div>
<div class="space-y-2">
<p class="text-base leading-relaxed" style="color: #e8e4d8">画理画法及布局意境影响深远</p>
<p class="text-base leading-relaxed" style="color: #e8e4d8">明清画家和近代画家从中得到启示</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
