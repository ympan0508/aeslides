<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>技法鉴赏 · 笔法与线条</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Serif SC", serif;
    background: #f5f5f0
    }
.title-font {
    font-family: "Noto Serif SC", serif
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex" style="background: #f4f1ea">
<!-- 左侧图片区域 -->
<div class="w-[48%] relative overflow-hidden flex flex-col">
<div class="relative flex-grow">
<img alt="富春山居图局部细节" class="w-full h-full object-cover" src="https://sfile.chatglm.cn/images-ppt/2bdffb9affa4.jpg"/>
<div class="absolute bottom-0 left-0 right-0 h-20" style="background: linear-gradient(to top, rgba(0, 0, 0, 0.4), transparent)"></div>
</div>
<div class="px-8 py-5" style="background: rgba(0, 0, 0, 0.05)">
<div class="flex items-center justify-center">
<i class="material-icons mr-2" style="color: #d4af37;
font-size: 24px">brush</i>
<span class="text-sm font-semibold" style="color: #5a6c7a">长披麻皴笔法 · 笔力交融</span>
</div>
</div>
</div>

<!-- 右侧文字内容区域 -->
<div class="w-[52%] flex flex-col justify-center px-14 py-10">
<div class="mb-6">
<h2 class="title-font text-4xl font-bold" style="color: #2c3e50">笔法与线条</h2>
<div class="w-20 h-0.5 mt-3" style="background: #d4af37"></div>
</div>

<div class="space-y-5">
<!-- 独特笔法 -->
<div class="flex items-start">
<div class="flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4" style="background: rgba(212, 175, 55, 0.15)">
<i class="material-icons" style="color: #d4af37;
font-size: 24px">auto_graph</i>
</div>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-1" style="color: #2c3e50">独特笔法</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">使用"长披麻皴"笔法，用毛笔中锋有力向下披刷，形成土壤厚实的质地</p>
</div>
</div>

<!-- 线条特点 -->
<div class="flex items-start">
<div class="flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4" style="background: rgba(212, 175, 55, 0.15)">
<i class="material-icons" style="color: #d4af37;
font-size: 24px">draw</i>
</div>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-1" style="color: #2c3e50">线条特点</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">采用点线结合、笔力变化，从细描到重笔，变化灵活自如</p>
</div>
</div>

<!-- 书法入画 -->
<div class="flex items-start">
<div class="flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4" style="background: rgba(212, 175, 55, 0.15)">
<i class="material-icons" style="color: #d4af37;
font-size: 24px">edit_calendar</i>
</div>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-1" style="color: #2c3e50">书法入画</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">以书法中的草籀笔法入画，首尾呼应、虚实交融，增强写意性</p>
</div>
</div>

<!-- 笔触分类 -->
<div class="flex items-start">
<div class="flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4" style="background: rgba(212, 175, 55, 0.15)">
<i class="material-icons" style="color: #d4af37;
font-size: 24px">layers</i>
</div>
<div class="flex-grow">
<h3 class="text-xl font-semibold mb-1" style="color: #2c3e50">笔触分类</h3>
<p class="text-base leading-relaxed" style="color: #5a6c7a">单势、重势、钩势、变势、草势和板斧势等，多用琢、点、染，呈现动态与自然美感</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
