<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>"模范党支部"战旗演讲PPT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer utilities {
.ppt-slide {
@apply relative w-[1280px] min-h-[720px] mx-auto box-border
}
}
</style>
<style>body {
    font-family: "Noto Sans SC", sans-serif;
    background: #f5f5f5
    }
.title-font {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 900
    }</style>
<style>.material-icons {
    width: 1em
    }</style><style>.material-icons {
    direction: rtl
    }</style></head>
<body>
<div class="ppt-slide h-[720px] flex flex-col relative overflow-hidden" style="background: #FEFEFE">
<div class="h-[80px] flex items-center px-16" style="background: linear-gradient(90deg, #C8102E 0%, #8B0000 100%)">
<h1 class="title-font text-5xl text-white tracking-wider">战旗新颜：新时代的转型与荣光</h1>
</div>

<div class="flex-grow flex h-[640px]">
<div class="w-[58%] flex flex-col justify-center px-16 py-8">
<div class="grid grid-cols-2 gap-5">
<div class="p-5 bg-gradient-to-br from-red-50 to-white rounded-lg shadow-lg border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">precision_manufacturing</i>
<h3 class="font-bold text-xl text-gray-800">装备更新</h3>
</div>
<p class="text-gray-700 text-base mb-1">新型装甲车、数字化通信设备</p>
<p class="text-gray-600 text-sm">党员攻关小组3个月完成手册编写</p>
</div>

<div class="p-5 bg-gradient-to-br from-red-50 to-white rounded-lg shadow-lg border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">psychology</i>
<h3 class="font-bold text-xl text-gray-800">训练创新</h3>
</div>
<p class="text-gray-700 text-base">精准侦察•协同打击•快速转移</p>
<p class="text-gray-600 text-sm">集团军合成营对抗演练零失误</p>
</div>

<div class="p-5 bg-gradient-to-br from-red-50 to-white rounded-lg shadow-lg border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">water_drop</i>
<h3 class="font-bold text-xl text-gray-800">河南抗洪</h3>
</div>
<p class="text-gray-700 text-base">2021年郑州地铁救援</p>
<p class="text-gray-600 text-sm">党员突击队12小时徒手挖掘救30人</p>
</div>

<div class="p-5 bg-gradient-to-br from-red-50 to-white rounded-lg shadow-lg border-l-4 border-red-700">
<div class="flex items-center mb-2">
<i class="material-icons text-red-700 mr-2">emoji_events</i>
<h3 class="font-bold text-xl text-gray-800">国际竞技</h3>
</div>
<p class="text-gray-700 text-base">2023年国际军事比赛</p>
<p class="text-gray-600 text-sm">战术射击项目团体冠军</p>
</div>
</div>

<div class="mt-6 p-6 bg-white rounded-lg shadow-lg border-l-4 border-yellow-500">
<div class="flex items-start space-x-4">
<i class="material-icons text-yellow-500 text-3xl">workspace_premium</i>
<div>
<h3 class="font-bold text-xl text-gray-800 mb-2">全军荣誉</h3>
<p class="text-gray-700 text-lg">全军基层建设标兵连<br/>集体二等功×2次、三等功×5次</p>
</div>
</div>
</div>
</div>

<div class="w-[42%] flex items-center justify-center p-10">
<div class="relative w-full">
<img src="https://sfile.chatglm.cn/images-ppt/d93a5e486b62.png" alt="现代训练" class="w-full h-[500px] object-cover rounded-lg shadow-2xl"/>
<div class="absolute -bottom-3 -right-3 bg-red-700 text-white px-5 py-3 rounded-lg shadow-lg">
<p class="font-bold text-lg">新时代·新风采</p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
